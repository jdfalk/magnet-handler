# Smart Dependabot configuration for bootstrap-magnet-handler.nJ1V9R
# Automatically detected: go, python, github-actions

version: 2
updates:
- package-ecosystem: pip
  directory: /
  schedule:
    interval: weekly
    day: tuesday
    time: 09:00
    timezone: America/New_York
  open-pull-requests-limit: 3
  commit-message:
    prefix: python
    include: scope
  labels:
  - dependencies
  - priority-medium
  allow:
  - dependency-type: direct
  - dependency-type: indirect
- package-ecosystem: gomod
  directory: /
  schedule:
    interval: weekly
    day: wednesday
    time: 09:00
    timezone: America/New_York
  open-pull-requests-limit: 5
  commit-message:
    prefix: go
    include: scope
  labels:
  - dependencies
  - priority-medium
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: friday
    time: 09:00
    timezone: America/New_York
  open-pull-requests-limit: 5
  commit-message:
    prefix: ci
    include: scope
  labels:
  - dependencies
  - priority-high
